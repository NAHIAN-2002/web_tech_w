<html>
<head>
    <title>Calculator</title>
    <script src="../JS/script.js"></script>
    <link rel="stylesheet" type="text/css" href="../CSS/style.css"/>
</head>

<body bgcolor="AACDDC">
    <div class="calculator">
        <input id="display" readonly>
        <div id="keys">
            <table>
                <tr>
                    <td> <button onclick="addToDisplay('1')">1</button></td>
                    <td> <button onclick="addToDisplay('2')">2</button></td>
                    <td> <button onclick="addToDisplay('3')">3</button></td>
                    <td> <button onclick="addToDisplay('+')" class="opeeration">+</button></td>
                </tr>
                <tr>
                    <td> <button onclick="addToDisplay('4')">4</button></td>
                    <td> <button onclick="addToDisplay('5')">5</button></td>
                    <td> <button onclick="addToDisplay('6')">6</button></td>
                    <td> <button onclick="addToDisplay('-')" class="opeeration">-</button></td>
                </tr>
                <tr>
                    <td> <button onclick="addToDisplay('7')">7</button></td>
                    <td> <button onclick="addToDisplay('8')">8</button></td>
                    <td> <button onclick="addToDisplay('9')">9</button></td>
                    <td> <button onclick="addToDisplay('*')" class="opeeration">x</button></td>
                </tr>
                <tr>
                    <td> <button onclick="addToDisplay('.')" style="font-size:15px;">.</button></td>
                    <td> <button onclick="addToDisplay('0')">0</button></td>
                    <td> <button onclick="backspace()" style="background-color: rgb(238, 104, 104);"><img src="../imgs/backspace.png" width="15px"></button></td>
                    <td> <button onclick="addToDisplay('/')" class="opeeration">/</button></td>
                </tr>
                <tr >
                    
                    <td colspan="2"> <button onclick="clearDisplay()" style="background-color: red;" id="lastButton">C</button></td>
                    <td colspan="2"> <button onclick="calculate()" style="background-color: rgb(28, 232, 28);" id="lastbutton">=</button></td>
                </tr>

            </table>
        </div>
</div>

</body>
</html>
